# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

palette = "gruvbox_dark"

format = """
$python$directory $git_branch$git_status$git_state$git_commit
$character
"""

right_format = """
$cmd_duration
"""

[character]
success_symbol = "[ ](bold fg:blue)"
error_symbol = "[ ](bold fg:red)"
vimcmd_symbol = "[](bold fg:green)"


[git_branch]
format = "[[\\[$symbol$branch](rosewater) | ](peach)"
symbol = "  "

[git_status]
format = "$all_status$ahead_behind\\] "
conflicted = "="
ahead = "[⇡${count} ](green)"
behind = "⇣${count} "
diverged = "[⇕⇡${ahead_count} ⇣${behind_count} ](teal)"
up_to_date = "[󰄸 ](bold green)"
untracked = "[?${count} ](maroon)"
stashed = "[󰏖  ](bold green)"
modified = "[~${count} ](yellow)"
staged = "[+${count} ](green)"
renamed = "[»${count} ](peach)"
# deleted = "[ ${count} ](bold red)"
deleted = "[-${count} ](bold red)"

[git_commit]
format = "[\\($hash\\)]($style) [\\($tag\\)]($style)"
style = "green"

[git_state]
rebase = "REBASING"
merge = "MERGING"
revert = "REVERTING"
cherry_pick = "CHERRY-PICKING"
bisect = "BISECTING"
am = "AM"
am_or_rebase = "AM/REBASE"
style = "yellow"
format = '\([$state( $progress_current/$progress_total)]($style)\) '

[python]
symbol = " "
format = '(\($virtualenv\) )($style)'

[cmd_duration]
min_time = 10
format = '󰥔 [$duration](bold purple)'
show_milliseconds = true



[directory]
home_symbol = "  "
read_only = "  "
style = "fg:yellow "
# truncation_length = 6
# truncation_symbol = " ••/"
fish_style_pwd_dir_length = 1
format = '[󰉋 $path]($style)'

[directory.substitutions]
"Desktop" = "  "
"Documents" = "  "
"Downloads" = "  "
"Music" = " 󰎈 "
"Pictures" = "  "
"Videos" = "  "
"GitHub" = " 󰊤 "

[palettes.gruvbox_dark]
rosewater = "#d3869b"
flamingo = "#fb4934"
pink = "#d3869b"
mauve = "#b16286"
red = "#fb4934"
maroon = "#cc241d"
peach = "#fe8019"
yellow = "#d79921"
green = "#98971a"
teal = "#689d6a"
sky = "#83a598"
sapphire = "#458588"
blue = "#458588"
lavender = "#d3869b"
text = "#ebdbb2"
subtext1 = "#d5c4a1"
subtext0 = "#bdae93"
overlay2 = "#928374"
overlay1 = "#7c6f64"
overlay0 = "#665c54"
surface2 = "#504945"
surface1 = "#3c3836"
surface0 = "#282828"
base = "#1d2021"
mantle = "#1d2021"
crust = "#181818"

